name: admin_app
description: wedit Admin Dashboard - Flutter Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.1
  supabase_flutter: ^2.8.0
  cached_network_image: ^3.4.1
  dartz: ^0.10.1
  intl: ^0.19.0
  google_maps_flutter_web: ^0.5.10
  google_maps_flutter: ^2.9.0
  fl_chart: ^0.69.0
  data_table_2: ^2.5.12
  file_picker: ^8.1.2
  get_it: ^8.0.2
  injectable: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
